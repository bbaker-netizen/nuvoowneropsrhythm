                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 6 }}>
                      <span className={`grade-owner-tag ${c.owner.toLowerCase()}`}>{c.owner}</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--g700)' }}>{c.area}</span>
                      {c.grade && <span style={{ fontSize: 13, fontWeight: 800, color: gradeColor(c.grade) }}>{c.grade}</span>}
                      {c.status && <span style={{ fontSize: 11, fontWeight: 600, padding: '2px 8px', borderRadius: 8,
                        background: c.status === 'On track' ? 'var(--green-light)' : 'var(--red-light)',
                        color: c.status === 'On track' ? 'var(--green)' : 'var(--red)' }}>{c.status}</span>}
                    </div>
                    <div style={{ fontSize: 14, color: 'var(--g800)', lineHeight: 1.55 }}>{c.commitment}</div>
                    {(c.due || c.communicate) && (
                      <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap', marginTop: 6, fontSize: 12, color: 'var(--g500)' }}>
                        {c.due && <span><strong style={{ color: 'var(--g600)' }}>Due:</strong> {c.due}</span>}
                        {c.communicate && <span><strong style={{ color: 'var(--g600)' }}>Communicate to:</strong> {c.communicate}</span>}
                      </div>
                    )}
                  </div>
                ))}
                <div style={{ marginTop: 16, display: 'flex', justifyContent: 'flex-end' }}>
                  <PlannerButton block />
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════
function App() {
  const [partner, setPartner] = useState(null);
  const [view, setView] = useState('dashboard');
  const [items, setItems] = useState([]);
  const [itemsByPartner, setItemsByPartner] = useState({ Conrad: [], Ben: [] });
  const [loading, setLoading] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [toast, setToast] = useState(null);
  const [envOk, setEnvOk] = useState(true);
  const [adminMode, setAdminMode] = useState('none'); // none | gate | in
  const [adminPass, setAdminPass] = useState('');

  const showToast = (message, type = 'info') => setToast({ message, type });

  const fetchItems = useCallback(async () => {
    if (!partner) return;
    setLoading(true);
    try {
      const fetchGroup = async (groupId) => {
        const result = await mondayAPI(`{
          boards(ids: ${CONFIG.BOARD_ID}) {
            groups(ids: "${groupId}") {
              items_page(limit: 50) {
                items {
                  id name
                  column_values { id text value }
                }
              }
            }
          }
        }`);
        const group = result?.data?.boards?.[0]?.groups?.[0];
        return group?.items_page?.items || [];
      };
      const [conradItems, benItems] = await Promise.all([
        fetchGroup(CONFIG.PARTNERS.Conrad.group),
        fetchGroup(CONFIG.PARTNERS.Ben.group)
      ]);
      const ownItems = partner === 'Conrad' ? conradItems : benItems;
      console.log(`Fetched ${conradItems.length} Conrad items, ${benItems.length} Ben items`);
      setItemsByPartner({ Conrad: conradItems, Ben: benItems });
      setItems(ownItems);
    } catch (err) {
      console.error('Fetch error:', err);
      if (err.message?.includes('fetch') || err.message?.includes('proxy')) setEnvOk(false);
    }
    setLoading(false);
  }, [partner]);

  useEffect(() => { if (partner) fetchItems(); }, [partner, fetchItems]);

  const handleSubmit = async (formData) => {
    setSubmitting(true);
    try {
      const weekOf = getMonday();
      const p = CONFIG.PARTNERS[partner];
      const cols = CONFIG.COLUMNS;

      const columnValues = {
        [cols.partner]: { ids: [p.dropdownId] },
        [cols.weekOf]: { date: weekOf },
        [cols.outcome1]: { text: formData.outcome1 },
        [cols.o1Priority]: { label: formData.o1Priority },
        [cols.meeting]: formData.meeting || '',
        [cols.risk]: formData.risk || '',
        [cols.status]: { label: 'Submitted' }
      };
      if (formData.outcome2) {
        columnValues[cols.outcome2] = { text: formData.outcome2 };
        if (formData.o2Priority) columnValues[cols.o2Priority] = { label: formData.o2Priority };
      }
      if (formData.outcome3) {
        columnValues[cols.outcome3] = { text: formData.outcome3 };
        if (formData.o3Priority) columnValues[cols.o3Priority] = { label: formData.o3Priority };
      }
      if (formData.delegation) columnValues[cols.delegation] = { text: formData.delegation };
      if (formData.support) columnValues[cols.support] = { text: formData.support };
      if (formData.aiSummary && formData.aiSummary !== '__skipped__' && !formData.aiSummary.startsWith('⚠')) columnValues[cols.aiSummary] = { text: formData.aiSummary };

      const itemName = `${partner} — Week of ${formatWeek(weekOf)}`;

      const result = await mondayAPI(`mutation ($boardId: ID!, $groupId: String!, $itemName: String!, $columnValues: JSON!) {
        create_item(board_id: $boardId, group_id: $groupId, item_name: $itemName, column_values: $columnValues) { id }
      }`, {
        boardId: String(CONFIG.BOARD_ID),
        groupId: p.group,
        itemName,
        columnValues: JSON.stringify(columnValues)
      });

      // Verify the item was actually created
      const createdId = result?.data?.create_item?.id;
      if (!createdId) {
        console.error('Submission response:', JSON.stringify(result));
        throw new Error('Item was not created — no ID returned from Monday.com');
      }
      console.log('Contract created successfully, item ID:', createdId);

      setSubmitted(true);
      showToast('Contract submitted successfully!', 'success');
      await fetchItems();
    } catch (err) {
      showToast('Submission failed: ' + err.message, 'error');
    }
    setSubmitting(false);
  };

  // Admin (Bruce) — passcode-gated finalize, separate from the owner flow
  if (adminMode === 'gate') return <AdminGate onAuthed={code => { setAdminPass(code); setAdminMode('in'); }} onBack={() => setAdminMode('none')} />;
  if (adminMode === 'in') return <AdminFinalize passcode={adminPass} onExit={() => { setAdminPass(''); setAdminMode('none'); }} />;

  // Login
  if (!partner) return <LoginScreen onSelect={setPartner} onCoach={() => setAdminMode('gate')} />;

  return (
    <div className="shell">
      <div className="topbar">
        <div className="brand"><span className="mark">NUVO</span> Operating Rhythm</div>
        <div className="topbar-right">
          <div className="user-pill"><div className="dot" />{partner === 'Conrad' ? 'Conrad Jones' : 'Ben Pond'}</div>
          <button className="logout-btn" onClick={() => { setPartner(null); setView('dashboard'); setItems([]); setSubmitted(false); }}>Sign Out</button>
        </div>
      </div>

      <div className="nav-tabs">
        <div className={`nav-tab ${view === 'dashboard' ? 'active' : ''}`} onClick={() => { setView('dashboard'); setSubmitted(false); }}>Dashboard</div>
        <div className={`nav-tab ${view === 'contract' ? 'active' : ''}`} onClick={() => { setView('contract'); setSubmitted(false); }}>New Contract</div>
        <div className={`nav-tab ${view === 'grading' ? 'active' : ''}`} onClick={() => { setView('grading'); setSubmitted(false); }}>Grading</div>
        <div className={`nav-tab ${view === 'meetings' ? 'active' : ''}`} onClick={() => { setView('meetings'); setSubmitted(false); }}>Meeting Notes</div>
        <div className={`nav-tab ${view === 'history' ? 'active' : ''}`} onClick={() => setView('history')}>History</div>
        <a className="nav-tab" href="https://nuvoscorecard.netlify.app/" target="_blank" rel="noopener noreferrer" style={{ marginLeft: 'auto', display: 'inline-flex', alignItems: 'center', gap: 6 }} title="Open the public Partnership Scoreboard in a new tab">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="6" y1="20" x2="6" y2="12" /><line x1="12" y1="20" x2="12" y2="6" /><line x1="18" y1="20" x2="18" y2="15" /></svg>
          Scoreboard ↗
        </a>
      </div>

      <div className="content">

        {view === 'grading' && <GradingView partner={partner} showToast={showToast} />}
        {view === 'meetings' && <MeetingNotesView showToast={showToast} />}

        {view !== 'grading' && view !== 'meetings' && (loading ? (
          <div className="empty-state"><div className="spinner" /><p style={{ marginTop: 16 }}>Loading from Monday.com…</p></div>
        ) : (
          <>
            {view === 'dashboard' && !submitted && (
              <DashboardView partner={partner} items={items} onNewContract={() => setView('contract')} loading={loading} />
            )}
            {view === 'contract' && !submitted && (
              <ContractForm partner={partner} onSubmit={handleSubmit} submitting={submitting} onCancel={() => setView('dashboard')} />
            )}
            {view === 'contract' && submitted && (
              <div className="success-screen">
                <div className="success-icon">✓</div>
                <h2>Contract Submitted</h2>
                <p>Your weekly contract for the week of {formatWeek(getMonday())} has been submitted. Bruce will review it on Friday.</p>
                <button className="btn btn-primary" onClick={() => { setSubmitted(false); setView('dashboard'); }}>Back to Dashboard</button>
              </div>
            )}
            {view === 'history' && <HistoryView items={items} itemsByPartner={itemsByPartner} currentPartner={partner} />}
          </>
        ))}
      </div>

      <Toast message={toast?.message} type={toast?.type} onClose={() => setToast(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
